# 前端容器内部的 nginx：只负责托管静态文件 + SPA 路由回退。
# /api 和 /wiki(图片) 由宿主机 nginx 反代，不会进到这里。
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 带 hash 的构建产物（文件名含 hash，内容变即换名）可长期不可变缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html 绝不可长期缓存：每次使用前都必须向服务器校验（ETag → 304 或拿到新版）。
    # 否则浏览器会按 Last-Modified 做启发式缓存，部署后仍用旧 index.html → 引用已被清理的旧 chunk
    # → 白屏 / 看到旧版本。SPA 回退到 /index.html 的内部重定向会再次匹配本规则，故所有 history 路由同样不缓存。
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Vue history 路由：找不到实体文件就回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
