# 前端容器内部的 nginx：只负责托管静态文件 + SPA 路由回退。
# /api 和 /wiki(图片) 由宿主机 nginx 反代，不会进到这里。
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 带 hash 的构建产物可长期缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Vue history 路由：找不到实体文件就回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
